name: Build e Release

on:
  push:
    tags:
      - 'v*'

  workflow_dispatch:

jobs:

  build-jar:

    name: Gerar JAR

    runs-on: ubuntu-latest

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Permissao Gradle
        working-directory: controle-horas
        run: chmod +x gradlew

      - name: Build Projeto
        working-directory: controle-horas
        run: ./gradlew clean build

      - name: Gerar JAR
        working-directory: controle-horas
        run: ./gradlew bootJar

      - name: Salvar JAR
        uses: actions/upload-artifact@v4
        with:
          name: jar-file
          path: controle-horas/build/libs/controle-horas.jar

  build-exe:

    name: Gerar EXE Windows

    runs-on: windows-latest

    needs: build-jar

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'

      - name: Gerar EXE
        working-directory: controle-horas
        shell: cmd
        run: gradlew.bat jpackage

      - name: Listar arquivos gerados
        shell: powershell
        run: |
          Get-ChildItem controle-horas\build\jpackage

      - name: Salvar EXE
        uses: actions/upload-artifact@v4
        with:
          name: exe-installer
          path: controle-horas/build/jpackage/*.exe

  release:

    name: Publicar Release

    needs:
      - build-jar
      - build-exe

    runs-on: ubuntu-latest

    if: startsWith(github.ref, 'refs/tags/')

    permissions:
      contents: write

    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Baixar JAR
        uses: actions/download-artifact@v4
        with:
          name: jar-file
          path: dist/

      - name: Baixar EXE
        uses: actions/download-artifact@v4
        with:
          name: exe-installer
          path: dist/

      - name: Copiar scripts Linux
        run: |
          cp controle-horas/scripts/instalar-linux.sh dist/
          cp controle-horas/scripts/desinstalar-linux.sh dist/

          chmod +x dist/instalar-linux.sh
          chmod +x dist/desinstalar-linux.sh

          ls -lh dist/

      - name: Criar Release
        uses: softprops/action-gh-release@v1
        with:

          name: "Controle de Horas ${{ github.ref_name }}"

          body: |

            ## Controle de Horas

            Sistema desktop para gerenciamento de jornada, banco de horas e escalas.

            ---

            ## Instalacao Windows

            1. Baixe o arquivo:
               `ControleHoras.exe`

            2. Execute o instalador

            3. Caso o Windows Defender mostre aviso:
               - Clique em "Mais informacoes"
               - Depois em "Executar assim mesmo"

            4. O sistema sera instalado automaticamente

            ---

            ## Instalacao Linux

            Execute:

            ```bash
            curl -sSL https://github.com/ODiogorocha/controle-horas/releases/latest/download/instalar-linux.sh | bash
            ```

            ---

            ## Requisitos

            - Windows 10/11
            - Linux Ubuntu/Debian
            - Java incluso no instalador Windows

          files: |
            dist/*.exe
            dist/*.jar
            dist/instalar-linux.sh
            dist/desinstalar-linux.sh